apiVersion: v1
kind: Service
metadata:
  name: {{ include "rusauth-authorization-example.fullname" . }}
  labels:
    {{- include "rusauth-authorization-example.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "rusauth-authorization-example.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http

