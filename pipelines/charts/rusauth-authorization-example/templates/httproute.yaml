apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "rusauth-authorization-example.fullname" . }}
  labels:
    {{- include "rusauth-authorization-example.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range .Values.gateway.sectionNames }}
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.gateway.namespace }}
      sectionName: {{ . }}
    {{- end }}
  hostnames:
    {{- range .Values.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    {{- if .Values.callbackProtection.enabled }}
    - matches:
        - path:
            type: Exact
            value: {{ .Values.callbackProtection.path | quote }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "rusauth-authorization-example.fullname" . }}-callback-ratelimit
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "rusauth-authorization-example.fullname" . }}-callback-inflightreq
      backendRefs:
        - name: {{ include "rusauth-authorization-example.fullname" . }}
          port: {{ .Values.service.port }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.pathPrefix | quote }}
      backendRefs:
        - name: {{ include "rusauth-authorization-example.fullname" . }}
          port: {{ .Values.service.port }}
