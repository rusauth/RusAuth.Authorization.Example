apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "rusauth-authorization-example.fullname" . }}
  labels:
    {{- include "rusauth-authorization-example.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range .Values.gateway.sectionNames }}
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.gateway.namespace }}
      sectionName: {{ . }}
    {{- end }}
  hostnames:
    {{- range .Values.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.pathPrefix | quote }}
      backendRefs:
        - name: {{ include "rusauth-authorization-example.fullname" . }}
          port: {{ .Values.service.port }}
